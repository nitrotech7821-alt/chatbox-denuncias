<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subprocuraduría - DIF Hermosillo</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
        .header { background-color: #004481; color: white; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; }
        .chat-container { max-width: 600px; margin: 20px auto; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 20px; height: 60vh; overflow-y: auto; display: flex; flex-direction: column; }
        .message { margin-bottom: 15px; padding: 12px 18px; border-radius: 20px; max-width: 85%; line-height: 1.5; }
        .bot-message { background-color: #e9ecef; align-self: flex-start; color: #333; }
        .user-message { background-color: #dcf8c6; align-self: flex-end; color: #333; }
        .folio-box { border: 2px dashed #004481; padding: 15px; border-radius: 10px; margin-top: 10px; text-align: center; font-weight: bold; color: #004481; background: #fff; }
        .whatsapp-btn { background-color: #25D366; color: white; padding: 12px 20px; border-radius: 8px; text-decoration: none; display: inline-flex; align-items: center; font-weight: bold; margin-top: 10px; }
        .input-area { max-width: 600px; margin: 10px auto; display: flex; flex-direction: column; gap: 12px; padding: 10px; }
        input, textarea, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; }
        .btn-send { background-color: #2ecc71; color: white; padding: 15px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
        label { font-size: 14px; font-weight: bold; color: #555; margin-bottom: -8px; }
    </style>
</head>
<body>

<div class="header">Subprocuraduría de la Defensa</div>

<div class="chat-container">
    <div class="message bot-message">Bienvenido al sistema de atención ciudadana. ¿En qué podemos apoyarle hoy?</div>

    {% if mensaje_usuario %}
    <div class="message user-message">{{ mensaje_usuario }}</div>
    {% endif %}

    {% if folio %}
    <div class="message bot-message">
        ¡Recibido! Su solicitud ha sido registrada.
        <div class="folio-box">
            Su folio es: {{ folio }}
            <br>
            <a href="https://wa.me/526621234567?text=Hola,%20realicé%20un%20trámite%20en%20el%20sistema.%20Mi%20folio%20es:%20{{ folio }}" 
               target="_blank" class="whatsapp-btn">
               <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" style="width: 20px; margin-right: 10px;">
               Enviar folio por WhatsApp
            </a>
        </div>
    </div>
    {% endif %}
</div>

<form class="input-area" method="POST" action="/">
    <label>Nombre Completo:</label>
    <input type="text" name="nombre" placeholder="Ej. Juan Pérez" required>
    
    <label>Tipo de Trámite:</label>
    <select name="tipo_tramite" required>
        <option value="" disabled selected>Seleccione una opción...</option>
        <option value="Asesoría Jurídica">Asesoría Jurídica</option>
        <option value="Reporte de Maltrato">Reporte de Maltrato</option>
        <option value="Apoyo Social">Apoyo Social</option>
        <option value="Cita con Subprocurador">Cita con Subprocurador</option>
        <option value="Otro">Otro</option>
    </select>

    <label>Descripción de los hechos:</label>
    <textarea name="descripcion" rows="3" placeholder="Detalle su situación aquí..." required></textarea>
    
    <button type="submit" class="btn-send">Enviar Solicitud Segura</button>
</form>

</body>
</html>
