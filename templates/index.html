<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Subprocuraduría - Chat de Denuncias</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Encabezado Institucional */
        .header {
            background-color: #004a99;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 10;
        }

        /* Área de Mensajes */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
        }

        .bot-message {
            align-self: flex-start;
            background-color: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .user-message {
            align-self: flex-end;
            background-color: #dcf8c6;
            color: #333;
            border-bottom-right-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        /* Formulario de Entrada */
        .input-area {
            background-color: white;
            padding: 15px;
            border-top: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: #004a99;
        }

        .btn-send {
            background-color: #25d366;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-send:hover {
            background-color: #128c7e;
        }

        .folio-box {
            background-color: #e3f2fd;
            border: 1px dashed #2196f3;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            margin-top: 5px;
            font-weight: bold;
            color: #0d47a1;
        }
    </style>
</head>
<body>

<div class="header">
    Subprocuraduría de la Defensa
</div>

<div class="chat-container">
    <!-- Mensaje del Bot -->
    <div class="message bot-message">
        Bienvenido. ¿Qué situación desea reportar el día de hoy?
    </div>

    <!-- Ejemplo de mensaje enviado (esto se genera con Flask) -->
    <div class="message user-message">
        Quiero reportar un problema en mi colonia.
    </div>

    <!-- Ejemplo de respuesta con Folio -->
    <div class="message bot-message">
        ¡Recibido! Hemos registrado su reporte.
        <div class="folio-box">Su folio es: D-2026-3604</div>
    </div>
</div>

<form class="input-area">
    <input type="text" name="nombre" placeholder="Nombre completo" required>
    <textarea name="descripcion" rows="3" placeholder="Describa los hechos aquí..." required></textarea>
    <button type="submit" class="btn-send">Enviar Reporte Seguro</button>
</form>

</body>
</html>
